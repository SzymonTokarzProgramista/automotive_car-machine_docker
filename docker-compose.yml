name: automotive-car-machine

services:
  backend:
    build:
      context: ../automotive_car-web_backend
      dockerfile: Dockerfile
    container_name: automotive_car_backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT_INTERNAL}/${POSTGRES_DB}
      CAMERA_STREAM_URL: ${CAMERA_STREAM_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS}
      RATE_LIMIT_GENERAL_REQUESTS: ${RATE_LIMIT_GENERAL_REQUESTS}
      RATE_LIMIT_AUTH_REQUESTS: ${RATE_LIMIT_AUTH_REQUESTS}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED}
      EMAIL_VERIFICATION_EXPIRES_MINUTES: ${EMAIL_VERIFICATION_EXPIRES_MINUTES}
      PUBLIC_UI_URL: ${PUBLIC_UI_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./settings:/machine/settings:ro
      - ./certificates:/machine/certificates:ro
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ../automotive_car-web_ui
      dockerfile: Dockerfile
    container_name: automotive_car_web_ui
    environment:
      VITE_API_URL: ${VITE_API_URL}
    expose:
      - "5173"
    volumes:
      - ./settings:/machine/settings:ro
      - ./certificates:/machine/certificates:ro
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: automotive_car_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./settings/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./settings:/machine/settings:ro
      - ./certificates:/machine/certificates:ro
    depends_on:
      - ui
      - backend

  thingsboard:
    image: thingsboard/tb-postgres:${THINGSBOARD_VERSION}
    container_name: automotive_car_thingsboard
    restart: unless-stopped
    ports:
      - "${THINGSBOARD_WEB_PORT}:9090"
      - "${THINGSBOARD_MQTT_PORT}:1883"
      - "${THINGSBOARD_EDGE_RPC_PORT}:7070"
      - "${THINGSBOARD_COAP_PORT_RANGE}:5683-5688/udp"
    volumes:
      - thingsboard_data:/data
      - thingsboard_logs:/var/log/thingsboard
      - ./settings:/machine/settings:ro
      - ./certificates:/machine/certificates:ro

  postgres:
    image: postgres:16-alpine
    container_name: automotive_car_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  thingsboard_data:
  thingsboard_logs:
