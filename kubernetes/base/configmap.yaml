apiVersion: v1
kind: ConfigMap
metadata:
  name: automotive-car-config
data:
  POSTGRES_DB: automotive_car
  POSTGRES_USER: automotive
  POSTGRES_PORT_INTERNAL: "5432"
  CAMERA_STREAM_URL: http://localhost:8081/stream.mjpg
  CORS_ORIGINS: http://localhost:30080,http://localhost:5173
  JWT_EXPIRES_MINUTES: "30"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_GENERAL_REQUESTS: "120"
  RATE_LIMIT_AUTH_REQUESTS: "12"
  EMAIL_VERIFICATION_REQUIRED: "true"
  EMAIL_VERIFICATION_EXPIRES_MINUTES: "60"
  PUBLIC_UI_URL: http://localhost:30080
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  SMTP_FROM_EMAIL: no-reply@automotive-car.local
  SMTP_USE_TLS: "true"
  VITE_API_URL: ""
  THINGSBOARD_VERSION: latest
